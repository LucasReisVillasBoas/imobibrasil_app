name: imobibrasil_app
description: App de listagem e detalhe de imóveis - ImobiBrasil
publish_to: none
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.3

  # Models
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Local Storage
  hive_flutter: ^1.1.0

  # Network & Images
  cached_network_image: ^3.4.1

  # UI
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1

  # Firebase
  firebase_core: ^3.13.0
  firebase_analytics: ^11.4.4

  # Utils
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^3.0.0
  json_serializable: ^6.9.0
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/images/
