name: CI — ImobiBrasil App

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: "3.41.5"

jobs:
  # ── JOB 1: Análise estática ─────────────────────────────────────────────────
  lint:
    name: 🔍 Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.14.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format lib/ test/ --output=none --set-exit-if-changed

      - name: Analyze code
        run: flutter analyze --fatal-infos --fatal-warnings

  # ── JOB 2: Testes unitários ──────────────────────────────────────────────────
  test:
    name: 🧪 Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.14.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test --reporter expanded --coverage

      - name: Upload coverage
        uses: codecov/codecov-action@v5.4.2
        with:
          file: coverage/lcov.info
          fail_ci_if_error: false

  # ── JOB 3: Build web ────────────────────────────────────────────────────────
  build-web:
    name: 🌐 Build Web
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.14.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build web (release)
        run: flutter build web --release

      - name: Upload build artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: web-build-${{ github.sha }}
          path: build/web/
          retention-days: 7

  # ── JOB 4: Build iOS (só no main) ───────────────────────────────────────────
  build-ios:
    name: 🍎 Build iOS
    runs-on: macos-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.14.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Create fake GoogleService-Info.plist for CI
        run: |
          cat > ios/Runner/GoogleService-Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>API_KEY</key>
            <string>fake-api-key-for-ci</string>
            <key>BUNDLE_ID</key>
            <string>br.com.imobibrasil.imobibrasilApp</string>
            <key>CLIENT_ID</key>
            <string>fake-client-id</string>
            <key>REVERSED_CLIENT_ID</key>
            <string>fake-reversed-client-id</string>
            <key>PROJECT_ID</key>
            <string>imobibrasil-app</string>
            <key>STORAGE_BUCKET</key>
            <string>imobibrasil-app.appspot.com</string>
            <key>GCM_SENDER_ID</key>
            <string>000000000000</string>
            <key>GOOGLE_APP_ID</key>
            <string>1:000000000000:ios:0000000000000000</string>
          </dict>
          </plist>
          EOF

      - name: Build iOS (no codesign)
        run: flutter build ios --release --no-codesign
